name: Run Aurora Integration Tests Custom Service Endpoint

on:
  workflow_dispatch:

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aurora-integration-tests:
    strategy:
      matrix:
        environment: ["mysql", "pg"]
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}_integ
    steps:
      - name: 'Clone repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 1
      - name: 'Set up JDK 8'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: 'Configure AWS credentials'
        id: creds
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: run_integration_test_codebuild
          role-duration-seconds: 21600
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          output-credentials: true
      - name: Run integration tests
        run: |
          ./gradlew --no-parallel --no-daemon test-all-${{ matrix.environment }}-aurora-internal
        env:
          AURORA_CLUSTER_DOMAIN: ${{ secrets.DB_CONN_SUFFIX }}
          RDS_DB_REGION: ${{ env.SERVICE_REGION }}
          AWS_ACCESS_KEY_ID: ${{ steps.creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.creds.outputs.aws-session-token }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          MYSQL_VERSION: ${{ env.MYSQL_ENGINE_VERSION }}
          PG_VERSION: ${{ env.PG_ENGINE_VERSION }}

      - name: 'Archive junit results ${{ matrix.environment }}'
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: junit-report-${{ matrix.environment }}
          path: ./wrapper/build/test-results
          retention-days: 5
      - name: 'Archive html summary report ${{ matrix.environment }}'
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: html-summary-report-${{ matrix.environment }}
          path: ./wrapper/build/report
          retention-days: 5
