name: Run Aurora 5-Instance Integration Tests Latest

on:
  workflow_dispatch:

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  aurora-5-instance-integration-tests-latest:
    name: 'Run Aurora 5-instance integration tests with latest engine version'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dbEngine: [ "mysql-aurora", "pg-aurora" ]
    steps:
      - name: 'Clone repository'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 50
      - name: 'Set up JDK 8'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: 'Configure AWS credentials'
        id: creds
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: run_integration_test_5_instance_latest
          role-duration-seconds: 21600
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          output-credentials: true
      - name: Run 5-instance integration tests
        run: |
          ./gradlew --no-parallel --no-daemon test-all-${{ matrix.dbEngine }} -Dtest-no-instances-2=true -Dtest-no-instances-3=true -Dtest-no-multi-az-cluster=true -Dtest-no-multi-az-instance=true
        env:
          AURORA_CLUSTER_DOMAIN: ${{ secrets.DB_CONN_SUFFIX }}
          RDS_DB_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_ACCESS_KEY_ID: ${{ steps.creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.creds.outputs.aws-session-token }}
          MYSQL_VERSION: "latest"
          PG_VERSION: "latest"
      - name: Mask data
        run: |
          ./gradlew --no-parallel --no-daemon maskJunitHtmlReport
      - name: Archive junit results for ${{ matrix.dbEngine }}
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: junit-report-latest-5-instance-${{ matrix.dbEngine }}
          path: ./wrapper/build/test-results
          retention-days: 5
      - name: Archive html summary report for ${{ matrix.dbEngine }}
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: html-summary-report-latest-5-instance-${{ matrix.dbEngine }}
          path: ./wrapper/build/report
          retention-days: 5
      - name: Get Github Action IP
        if: always()
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Remove Github Action IP
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress --group-name default --protocol all --port 0-65535 --cidr ${{ steps.ip.outputs.ipv4 }}/32
