name: 'Release Draft'

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  build:
    name: 'Build Release Artifacts'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 'Clone Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 50
      - name: 'Set up JDK 8'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: 'Build Driver'
        run: |
          ./gradlew --no-parallel --no-daemon -x test build
          ./gradlew --no-parallel --no-daemon -x test shadowJar
      - name: 'Set Version Env Variable'
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
      - name: 'Get Release Details'
        run: |
          export RELEASE_DETAILS="$(awk -vN=2 'n<N;/^## /{++n}' CHANGELOG.md)"
          export RELEASE_DETAILS="$(sed '${/^# /d;}' <<< "$RELEASE_DETAILS")"
          export RELEASE_DETAILS="$(sed '$d' <<< "$RELEASE_DETAILS")"
          touch RELEASE_DETAILS.md
          echo "$RELEASE_DETAILS" > RELEASE_DETAILS.md
      - name: 'Install GPG Secret Key'
        id: import_gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --passphrase-fd 0 --pinentry-mode loopback --sign --armor /dev/null
      - name: 'Sign Jars'
        working-directory: ./wrapper
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          export GPG_TTY=$(tty)
          KEYGRIP="$(gpg --with-keygrip -K | grep -Pom1 '^ *Keygrip += +\K.*')"
          echo "$GPG_PASSPHRASE" | /usr/lib/gnupg2/gpg-preset-passphrase -c $KEYGRIP
          for jar in build/libs/*.jar; do gpg --detach-sign --armor $jar; done
          for signed in build/libs/*.asc; do gpg --verify $signed; done
      - name: 'Generate subject digests'
        id: hash
        working-directory: ./wrapper/build/libs
        run: |
          echo "hashes=$(sha256sum * | base64 -w0)" >> $GITHUB_OUTPUT
      - name: 'Upload build artifacts'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-artifacts
          path: ./wrapper/build/libs/*
          if-no-files-found: error
          retention-days: 5
      - name: 'Upload release details'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-details
          path: RELEASE_DETAILS.md
          retention-days: 5

  provenance:
    name: 'Generate SLSA Provenance'
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: false

  release:
    name: 'Create Draft Release'
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Download build artifacts'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: release-artifacts
          path: ./artifacts
      - name: 'Download release details'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: release-details
      - name: 'Download SLSA provenance'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: ./provenance
      - name: 'Upload to Draft Release'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1
        with:
          draft: true
          name: "AWS Advanced JDBC Wrapper - v${{ needs.build.outputs.version }}"
          bodyFile: RELEASE_DETAILS.md
          artifacts: ./artifacts/*,./provenance/*
          token: ${{ secrets.GITHUB_TOKEN }}
