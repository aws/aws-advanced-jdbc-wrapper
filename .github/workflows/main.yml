name: Main CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - main-2.x
  pull_request:
    branches:
      - '*'
    paths-ignore:
      - '**/release_draft.yml'
      - '**/maven*.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-changes:
    name: 'Check for changes'
    runs-on: ubuntu-latest
    outputs:
      only_docs: ${{ steps.check.outputs.ONLY_DOCS }}
      docs_changed: ${{ steps.check.outputs.DOCS_CHANGED }}
    steps:
      - name: 'Clone repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 50
      - name: 'Get changed files'
        id: changed-files-specific
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96  # v47.0.1
        with:
          files_yaml: |
            doc:
              - '**/*.md'
              - '**/docs/**'
              - '**/*.jpg'
              - '**/*.png'
      - name: 'Determine change type'
        id: check
        run: |
          if [[ "${{ steps.changed-files-specific.outputs.doc_only_changed }}" == "true" || "${{ steps.changed-files-specific.outputs.doc_only_modified }}" == "true" ]]; then
            echo "ONLY_DOCS=true" >> $GITHUB_OUTPUT
          else
            echo "ONLY_DOCS=false" >> $GITHUB_OUTPUT
          fi
          if [[ "${{ steps.changed-files-specific.outputs.doc_any_changed }}" == "true" ]]; then
            echo "DOCS_CHANGED=true" >> $GITHUB_OUTPUT
          else
            echo "DOCS_CHANGED=false" >> $GITHUB_OUTPUT
          fi

  markdown-link-check:
    name: 'Markdown link check'
    needs: check-changes
    if: ${{ needs.check-changes.outputs.docs_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225  # v1
        with:
          use-quiet-mode: 'yes'
          folder-path: 'docs'
          config-file: '.github/workflows/mlc_config.json'

  lint:
    name: 'Static analysis'
    needs: check-changes
    if: ${{ needs.check-changes.outputs.only_docs == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: 'Clone repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 50
      - name: 'Set up JDK 8'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: 'Cache Gradle packages'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: 'Run checkstyle and spotbugs'
        run: ./gradlew --build-cache checkstyleMain checkstyleTest spotbugsMain spotbugsTest

  test:
    name: 'Unit tests and coverage'
    needs: check-changes
    if: ${{ needs.check-changes.outputs.only_docs == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: 'Clone repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 50
      - name: 'Set up JDK 8'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: 'Cache Gradle packages'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: 'Run tests with coverage'
        run: ./gradlew --build-cache test jacocoTestReport jacocoTestCoverageVerification
      - name: 'Archive test results'
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: 'junit-report'
          path: ./wrapper/build/reports/tests/test/
          retention-days: 3

  ci-gate:
    name: 'CI Gate'
    needs: [check-changes, markdown-link-check, lint, test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: 'Verify required jobs did not fail'
        run: |
          # Fail only if a needed job actually failed or was cancelled.
          # Skipped jobs (e.g. tests on doc-only PRs) are treated as passing,
          # so this gate is the single required status check for branch protection.
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" \
             || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "A required job failed or was cancelled."
            exit 1
          fi
          echo "All required jobs passed or were legitimately skipped."
