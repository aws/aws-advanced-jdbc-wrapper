name: 'Release to Maven'

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  ubuntu-latest-jdbc-wrapper-release-to-maven:
    name: 'Build And Release to Maven'
    runs-on: ubuntu-latest
    steps:
      - name: 'Clone Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 50
      - name: 'Set up JDK 8'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: 'Build Driver'
        run: |
          ./gradlew --no-parallel --no-daemon -x test build
          ./gradlew --no-parallel --no-daemon -x test shadowJar
      - name: "Decode Key Ring"
        run: |
          echo "${{secrets.GPG_SECRET_KEY_FILE}}" > ~/.gradle/secring.gpg.b64
          base64 -d ~/.gradle/secring.gpg.b64 > ~/.gradle/secring.gpg
      - name: 'Install GPG Secret Key'
        id: import_gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --passphrase-fd 0 --pinentry-mode loopback --sign --armor /dev/null
      - name: 'Set up signing properties'
        run: |
          echo "signing.keyId=$SIGNING_KEY_ID" >> ~/.gradle/gradle.properties
          echo "signing.password=$SIGNING_PASSWORD" >> ~/.gradle/gradle.properties
          echo "signing.secretKeyRingFile=$HOME/.gradle/secring.gpg" >> ~/.gradle/gradle.properties
        env:
          SIGNING_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
      - name: 'Publish to Maven'
        run: |
          ./gradlew --no-parallel --no-daemon publishAllPublicationsToMavenRepository -Prelease=true -PjacocoEnabled=false
          ./gradlew --no-parallel --no-daemon postPublishToMaven
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
