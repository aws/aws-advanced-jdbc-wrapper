name: 'Snapshot to Maven'

on:
  push:
    branches:
      - main
      - main-2.x
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-latest-jdbc-wrapper-snapshot-to-maven:
    name: 'Build And Upload Snapshot to Maven'
    runs-on: ubuntu-latest
    steps:
      - name: 'Clone Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 50
      - name: 'Set up JDK 8'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: 'corretto'
          java-version: 8
      - name: 'Build Driver'
        run: |
          ./gradlew --no-parallel --no-daemon -x test build
          ./gradlew --no-parallel --no-daemon -x test shadowJar
      - name: "Decode Key Ring"
        env:
          GPG_SECRET_KEY_FILE: ${{ secrets.GPG_SECRET_KEY_FILE }}
        run: |
          echo "$GPG_SECRET_KEY_FILE" > ~/.gradle/secring.gpg.b64
          base64 -d ~/.gradle/secring.gpg.b64 > ~/.gradle/secring.gpg
      - name: 'Validate GPG secrets'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY secret is empty or missing"
            exit 1
          fi
          if [ -z "$GPG_PASSPHRASE" ]; then
            echo "GPG_PASSPHRASE secret is empty or missing"
            exit 1
          fi
      - name: 'Install GPG Secret Key'
        id: import_gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s\n' "$GPG_PASSPHRASE" | gpg --batch --passphrase-fd 0 --pinentry-mode loopback --sign --armor --output /dev/null /dev/null
      - name: 'Set up signing properties'
        run: |
          echo "signing.keyId=$SIGNING_KEY_ID" >> ~/.gradle/gradle.properties
          echo "signing.password=$SIGNING_PASSWORD" >> ~/.gradle/gradle.properties
          echo "signing.secretKeyRingFile=$HOME/.gradle/secring.gpg" >> ~/.gradle/gradle.properties
        env:
          SIGNING_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
      - name: 'Upload Snapshot to Maven'
        run: |
          ./gradlew --no-parallel --no-daemon publishAllPublicationsToMavenRepository -Psnapshot=$ENABLE_SNAPSHOT -PjacocoEnabled=false
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          ENABLE_SNAPSHOT: ${{ secrets.ENABLE_SNAPSHOT }}
