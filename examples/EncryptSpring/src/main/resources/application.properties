spring.datasource.driver-class-name=software.amazon.jdbc.Driver
spring.datasource.url=jdbc:aws-wrapper:postgresql://${db.host:localhost}:${db.port:5432}/${db.name:spring}

# AWS JDBC Wrapper Configuration
spring.datasource.hikari.data-source-properties.wrapperPlugins=${aws.jdbc.wrapper.plugins:kmsEncryption}
spring.datasource.hikari.data-source-properties.kmsEncryptionKeyId=${aws.kms.key.id:arn:aws:kms:us-east-1:<youraccount>:key/<keyid>}
spring.datasource.hikari.data-source-properties.kmsEncryptionColumns=${aws.kms.encryption.columns:users.ssn}
spring.datasource.hikari.data-source-properties.encryptionMetadataSchema=${aws.kms.metadata.schema:encrypt}

spring.datasource.username=${db.username:test}
spring.datasource.password=${db.password:test}

# Initialize schema before Hibernate - use custom separator for PostgreSQL functions
spring.sql.init.mode=always
spring.sql.init.separator=^;
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
